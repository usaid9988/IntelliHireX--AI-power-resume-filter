<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in — IntelliHireX</title>

<style>
:root{
  --accent:#4f8cff;
  --muted:#9aa6bf;
  --card:rgba(255,255,255,0.04);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  background:linear-gradient(180deg,#071029,#061127);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#e6eef9;
}
.panel{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  padding:32px;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
h2{margin:0 0 6px}
p{margin:0 0 18px;color:var(--muted)}
.field{
  margin-bottom:14px;
}
label{
  font-size:12px;
  color:var(--muted);
}
input{
  width:100%;
  padding:12px;
  margin-top:4px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  background:transparent;
  color:#fff;
}
button{
  width:100%;
  margin-top:16px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,var(--accent),#2d6ee6);
  color:white;
  font-weight:700;
  cursor:pointer;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.muted{
  margin-top:14px;
  font-size:13px;
  text-align:center;
  color:var(--muted);
}
a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>

<body>
<div class="panel">
  <h2>Welcome back</h2>
  <p>Sign in to IntelliHireX</p>

  <div class="field">
    <label>Email</label>
    <input id="email" type="email" placeholder="you@company.com"/>
  </div>

  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••"/>
  </div>

  <button id="signinBtn">Sign in</button>

  <div class="muted">
    New here? <a href="register.html">Create account</a>
  </div>
</div>

<script>
const btn = document.getElementById("signinBtn");

btn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Signing in...";

  try{
    const res = await fetch("/api/auth/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.message || "Login failed");
      btn.disabled = false;
      btn.innerText = "Sign in";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);

    // ✅ ROLE BASED REDIRECT
    if(data.role === "admin") location.href = "admin.html";
    else if(data.role === "recruiter") location.href = "dashboard.html";
    else location.href = "index.html";

  }catch(err){
    alert("Network error");
  }finally{
    btn.disabled = false;
    btn.innerText = "Sign in";
  }
});
(async function(){
  const nav = document.getElementById("authContainer");
  const token = localStorage.getItem("token");

  if(!token){
    nav.innerHTML = `<a class="btn" href="login.html">Sign in</a>`;
    return;
  }

  try{
    const res = await fetch("/api/auth/me", {
      headers:{ Authorization:"Bearer "+token }
    });
    if(!res.ok) throw new Error();

    const user = await res.json();
    localStorage.setItem("role", user.role);

    nav.innerHTML = `
      <a class="auth-name" href="profile.html">
        <span class="avatar">${user.name[0].toUpperCase()}</span>
        ${user.name}
      </a>
      <button class="btn" id="logoutBtn">Logout</button>
    `;

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.clear();
      location.reload();
    };

    // Hide rankings if not admin
    if(user.role !== "admin"){
      const rankBtn = document.getElementById("rankBtn");
      if(rankBtn) rankBtn.style.display="none";
    }

  }catch(e){
    localStorage.clear();
    nav.innerHTML = `<a class="btn" href="login.html">Sign in</a>`;
  }
})();
</script>
</body>
</html>
