<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Apply as Recruiter | IntelliHireX</title>

<style>
:root{--accent:#4f8cff;--muted:#9aa6bf}
body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  background:linear-gradient(180deg,#071029,#061127);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#e6eef9
}
.panel{
  width:480px;
  background:rgba(255,255,255,.04);
  padding:28px;
  border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.6)
}
label{display:block;margin-top:12px;font-size:13px}
input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;
  color:#fff
}
button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,var(--accent),#2d6ee6);
  color:white;
  font-weight:700;
  cursor:pointer
}
.note{
  font-size:13px;
  color:var(--muted);
  margin-top:10px
}
</style>
</head>

<body>
<div class="panel">
  <h2>Apply as Recruiter</h2>
  <p class="note">
    Recruiter access requires admin approval.
  </p>

  <label>Company name</label>
  <input id="company" placeholder="Acme Technologies Pvt Ltd"/>

  <button id="applyBtn">Submit Application</button>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

// ✅ bind explicitly (no inline onclick)
document.getElementById("applyBtn").addEventListener("click", apply);

async function apply() {
  const company = document.getElementById("company").value.trim();

  if (!company) {
    alert("Company name is required");
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/api/auth/request-recruiter", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ company })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Request failed");
      return;
    }

    alert("Application submitted successfully.\nWaiting for admin approval.");
    window.location.href = "index.html";

  } catch (err) {
    console.error(err);
    alert("Network error");
  }
}
</script>
</body>
</html>
