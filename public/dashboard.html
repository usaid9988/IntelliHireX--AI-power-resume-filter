<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — Candidate Rankings | IntelliHireX</title>
  <meta name="description" content="Recruiter dashboard — ranked candidates and resume details." />
  <style>
    :root{
      --bg:#071029; --card:#071229; --accent:#4f8cff; --muted:#9aa6bf; --radius:12px; --max-width:1200px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#071029,#061127);color:#e6eef9}
    .wrap{max-width:var(--max-width);margin:0 auto;padding:22px}
    header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
    .brand{font-weight:800;color:var(--accent);text-decoration:none}
    .actions{display:flex;gap:10px;align-items:center}
    .btn{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:700;background:transparent;color:var(--muted)}
    .btn-logout{background:#ef4444;color:#fff}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:18px;border-radius:12px;box-shadow:0 18px 50px rgba(3,6,23,0.6)}
    h2{margin:0 0 14px 0;color:var(--accent)}
    .controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .search{padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);flex:1;min-width:160px;background:transparent;color:#e6eef9}
    .table-wrap{overflow:auto;border-radius:10px;margin-top:6px}
    table{width:100%;border-collapse:collapse;min-width:720px}
    th,td{padding:12px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.03)}
    th{background:rgba(255,255,255,0.01);font-weight:700;color:#cfe3ff;white-space:nowrap}
    tr{transition:transform .18s ease, box-shadow .18s ease}
    tr:hover{transform:translateY(-4px);box-shadow:0 6px 24px rgba(0,0,0,0.6)}
    .skills{color:var(--muted);font-size:13px}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:700;font-size:13px;color:white}
    .high{background:#16a34a}
    .medium{background:#f59e0b;color:#082032}
    .low{background:#ef4444}
    .empty{padding:48px;text-align:center;color:var(--muted)}

    .skeleton-row{height:56px;background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04), rgba(255,255,255,0.02));border-radius:8px;animation:shimmer 1.2s linear infinite}
    @keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}

    .reveal{opacity:0;transform:translateY(12px);transition:opacity .6s ease, transform .6s ease}
    .reveal.visible{opacity:1;transform:none}
    @media (max-width:720px){table{min-width:unset}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="index.html">IntelliHireX</a>
      <div class="actions">
        <a class="btn" href="upload.html">Submit Resume</a>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <main>
      <h2>Candidate Rankings</h2>

      <section class="card reveal" id="rankingCard" aria-labelledby="rankings-heading">
        <div class="controls" role="toolbar" aria-label="Table controls">
          <input id="q" class="search" placeholder="Search by name, email or skill" aria-label="Search candidates" />
          <select id="filter" style="padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#e6eef9">
            <option value="all">All scores</option>
            <option value="high">High (75+)</option>
            <option value="medium">Medium (40–74)</option>
            <option value="low">Low (&lt;40)</option>
          </select>
        </div>

        <div class="table-wrap">
          <table aria-describedby="rankings-heading">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Skills</th>
                <th>Score</th>
                <th>Resume</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="5"><div class="skeleton-row" style="width:100%"></div></td></tr>
              <tr><td colspan="5"><div class="skeleton-row" style="width:92%"></div></td></tr>
              <tr><td colspan="5"><div class="skeleton-row" style="width:98%"></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function(){
      const el = document.getElementById('rankingCard');
      requestAnimationFrame(()=> setTimeout(()=> el.classList.add('visible'), 80));
    })();

    const API_BASE = 'http://localhost:5000/api';
    const token = localStorage.getItem("token");
    if (!token) {
      alert("Login first");
      window.location = "login.html";
    }

    async function checkRole() {
      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: "Bearer " + token } });
        if (!res.ok) throw new Error("Unauthorized");

        const data = await res.json();
        localStorage.setItem("role", data.role);

        if (data.role !== "admin") {
          alert("Only admins can view candidate rankings");
          window.location = "index.html";
        }
      } catch(e) {
        console.error(e);
        alert("Cannot fetch user info. Please login again.");
        window.location = "login.html";
      }
    }
    checkRole();

    function authHeaders(){ return { 'Authorization': "Bearer " + token, 'Content-Type': 'application/json' }; }
    function logout(){ localStorage.removeItem('token'); window.location='login.html'; }
    function scoreClass(score){
      if(score >= 75) return 'badge high';
      if(score >= 40) return 'badge medium';
      return 'badge low';
    }

    async function fetchResumes(){
      const tbody = document.getElementById('tableBody');
      try{
        const res = await fetch(`${API_BASE}/resumes/ranked`, { headers: authHeaders() });
        if(!res.ok){
          const err = await res.json().catch(()=>({message:'Failed to load'}));
          tbody.innerHTML = `<tr><td colspan="5" class="empty">Error: ${err.message || 'Unable to fetch data'}</td></tr>`;
          return [];
        }
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      }catch(e){
        console.error(e);
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Network error while fetching candidates</td></tr>`;
        return [];
      }
    }

    function escapeHtml(s){ return String(s || '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function renderRows(rows){
  const tbody = document.getElementById('tableBody');
  if(!rows.length){ 
    tbody.innerHTML = `<tr><td colspan="5" class="empty">No candidates found</td></tr>`; 
    return; 
  }

  tbody.innerHTML = rows.map(r=>{
    const skills = Array.isArray(r.skills) ? r.skills.join(', ') : (r.skills || '');
    const score = (typeof r.score === 'number') ? Math.round(r.score) : (r.score || 0);

    const resumeActions = r.filename
      ? `
        <a 
          href="http://localhost:5000/api/resumes/view/${r.filename}" 
          target="_blank"
          style="color:#4f8cff;text-decoration:none;margin-right:10px"
        >View</a>

        <button 
          class="downloadBtn" 
          data-filename="${r.filename}" 
          style="color:#4f8cff;background:none;border:none;cursor:pointer"
        >
          Download
        </button>
      `
      : "—";

    return `<tr>
      <td>${escapeHtml(r.name||'')}</td>
      <td>
        <a href="mailto:${escapeHtml(r.email||'')}" style="color:#cfe3ff;text-decoration:none">
          ${escapeHtml(r.email||'')}
        </a>
      </td>
      <td class="skills">${escapeHtml(skills)}</td>
      <td><span class="${scoreClass(score)}">${score}%</span></td>
      <td>${resumeActions}</td>
    </tr>`;
  }).join('');
}


    async function refresh(){
      const all = await fetchResumes();
      window._candidates = all;
      applyFilters();
    }

    function applyFilters(){
      const q = (document.getElementById('q').value || '').toLowerCase();
      const filter = document.getElementById('filter').value;
      const rows = (window._candidates || []).filter(c=>{
        if(filter==='high' && !(c.score >= 75)) return false;
        if(filter==='medium' && !(c.score >=40 && c.score<75)) return false;
        if(filter==='low' && !(c.score < 40)) return false;
        if(!q) return true;
        return (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || ((Array.isArray(c.skills)?c.skills.join(' '):(c.skills||'')).toLowerCase().includes(q));
      });
      renderRows(rows);
      const rowsEls = document.querySelectorAll('#tableBody tr');
      rowsEls.forEach((row,i)=> { row.style.opacity = 0; setTimeout(()=> row.style.transition='opacity .4s ease', i*30); setTimeout(()=> row.style.opacity = 1, 30 + i*30); });
    }

    document.getElementById('q').addEventListener('input', applyFilters);
    document.getElementById('filter').addEventListener('change', applyFilters);

    refresh();

    // Secure download handler
    document.addEventListener('click', async function(e){
      if(!e.target.classList.contains('downloadBtn')) return;
      const filename = e.target.dataset.filename;
      try{
        const res = await fetch(`${API_BASE}/resumes/download/${filename}`, {
          headers: { Authorization: "Bearer " + token }
        });
        if(!res.ok) throw new Error("Failed to download");
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      }catch(err){
        console.error(err);
        alert("Download failed: " + err.message);
      }
    });
  </script>
</body>
</html>
