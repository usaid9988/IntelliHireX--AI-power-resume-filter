<!DOCTYPE html>
<html>
<head>
<title>Recruiter Signup</title>
<style>
body{background:#071029;color:#fff;font-family:Inter}
.box{max-width:420px;margin:80px auto;background:#0b1220;padding:30px;border-radius:12px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}
button{background:#4f8cff;color:#fff;font-weight:700}
.note{font-size:13px;color:#aaa;margin-top:10px}
</style>
</head>
<body>

<div class="box">
<h2>Recruiter Registration</h2>
<input id="name" placeholder="Name">
<input id="company" placeholder="Company">
<input id="email" placeholder="Work Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Request Access</button>
<p class="note">Admin approval required</p>
</div>

<script>
async function register(){
  const body={
    name:name.value,
    email:email.value,
    password:password.value,
    company:company.value,
    role:"recruiter"
  };

  await fetch("/api/auth/register",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });

  alert("Request sent. Wait for admin approval.");
  location.href="login.html";
}
</script>
</body>
</html>
