<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Submit Resume — IntelliHireX</title>
<meta name="description" content="Submit candidate resume and skills to IntelliHireX for scoring." />
<style>
:root{--accent:#4f8cff;--muted:#9aa6bf}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#071029,#061127);display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;color:#e6eef9}
.panel{max-width:640px;width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:28px;border-radius:12px;box-shadow:0 18px 60px rgba(2,6,23,0.6)}
h2{margin:0 0 6px 0}
p.lead{margin:0 0 12px 0;color:var(--muted)}
label{display:block;font-size:13px;margin:10px 0 6px}
input, select{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#e6eef9;margin-bottom:10px}
.actions{display:flex;gap:10px;margin-top:16px}
button{padding:12px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent),#2d6ee6);color:white;font-weight:700;cursor:pointer}
.secondary{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:12px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="panel">
  <h2>Submit Resume</h2>
  <p class="lead">Upload candidate details to evaluate and rank them.</p>

  <label for="name">Full name</label>
  <input id="name" placeholder="Jane Doe" />

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="jane@company.com" />

  <label for="role">Role</label>
  <select id="role">
    <option value="fullstack">Fullstack Developer</option>
    <option value="backend">Backend Developer</option>
    <option value="frontend">Frontend Developer</option>
  </select>

  <label for="skills">Skills (comma separated)</label>
  <input id="skills" placeholder="Python, Machine Learning, SQL, Communication" />

  <label for="resume">Upload PDF Resume</label>
  <input id="resume" type="file" accept=".pdf" />

  <div class="actions">
    <button id="submitBtn">Submit</button>
    <a class="secondary" href="dashboard.html">Back to dashboard</a>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
if(!token){ alert("Login first"); window.location='login.html'; }

document.getElementById("submitBtn").addEventListener("click", async function(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const role = document.getElementById("role").value;
  const skills = document.getElementById("skills").value;
  const resumeFile = document.getElementById("resume").files[0];

  if(!name || !email || !role || !skills || !resumeFile){
    alert("All fields are required");
    return;
  }

  const skillsArray = skills.split(",").map(s=>s.trim()).filter(Boolean);
  const formData = new FormData();
  formData.append("name", name);
  formData.append("email", email);
  formData.append("role", role);
  formData.append("skills", JSON.stringify(skillsArray));
  formData.append("resume", resumeFile);

  try{
    const res = await fetch("http://localhost:5000/api/resumes/upload", {
      method:"POST",
      headers: { "Authorization": "Bearer " + token },
      body: formData
    });
    const data = await res.json();
    if(res.ok){
      alert(data.message || "Resume submitted successfully");
      window.location = "dashboard.html";
    } else {
      alert(data.message || "Submission failed");
    }
  } catch(err){
    console.error(err);
    alert("Network error");
  }
});
</script>
</body>
</html>
